name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DevEnterprise.Scrapi.Sdk.slnx

      - name: Build
        run: dotnet build DevEnterprise.Scrapi.Sdk.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DevEnterprise.Scrapi.Sdk.slnx --configuration Release --no-build --verbosity normal
