name: Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to NuGet"
        type: boolean
        default: false

concurrency:
  group: publish
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Bump package version
        id: bump_version
        run: |
          current_version=$(grep -oP '(?<=<Version>)[^<]+' DevEnterprise.Scrapi.Sdk.csproj | head -1 | tr -d '[:space:]')
          if [ -z "$current_version" ]; then
            echo "Could not locate <Version> in DevEnterprise.Scrapi.Sdk.csproj." && exit 1
          fi

          IFS='.' read -ra parts <<< "$current_version"
          if [ "${#parts[@]}" -ne 4 ]; then
            echo "Expected 4-part version format (major.minor.patch.revision), got '$current_version'." && exit 1
          fi

          parts[3]=$(( ${parts[3]} + 1 ))
          new_version="${parts[0]}.${parts[1]}.${parts[2]}.${parts[3]}"

          sed -i "s|<Version>$current_version</Version>|<Version>$new_version</Version>|g" DevEnterprise.Scrapi.Sdk.csproj
          sed -i "s|<AssemblyVersion>$current_version</AssemblyVersion>|<AssemblyVersion>$new_version</AssemblyVersion>|g" DevEnterprise.Scrapi.Sdk.csproj
          sed -i "s|<FileVersion>$current_version</FileVersion>|<FileVersion>$new_version</FileVersion>|g" DevEnterprise.Scrapi.Sdk.csproj

          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push tag
        if: inputs.publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DevEnterprise.Scrapi.Sdk.csproj
          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
            exit 0
          fi
          git commit -m "chore(release): bump version to v${{ steps.bump_version.outputs.new_version }}"
          git tag "v${{ steps.bump_version.outputs.new_version }}"
          git push --follow-tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DevEnterprise.Scrapi.Sdk.slnx

      - name: Build
        run: dotnet build DevEnterprise.Scrapi.Sdk.slnx --configuration Release --no-restore

      - name: Pack NuGet
        run: dotnet build DevEnterprise.Scrapi.Sdk.csproj --configuration NuGet --no-restore

      - name: Collect packages
        run: |
          mkdir -p artifacts
          find . -name "*.nupkg" -not -name "*.symbols.nupkg" -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload package artifacts
        if: inputs.publish
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: artifacts/*.nupkg

  publish:
    needs: build
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: nuget
      url: https://www.nuget.org/packages/ScrAPI

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: artifacts

      - name: NuGet login (Trusted Publishing)
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish
        run: dotnet nuget push artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --skip-duplicate

  create-release:
    needs: [build, publish]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: v${{ needs.build.outputs.new_version }}
          generate_release_notes: true
